name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend (Python / pytest) ───────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: uzumbot_test
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: uzumbot_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U uzumbot_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: packages/backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: packages/backend/requirements*.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run Alembic migrations
        env:
          DATABASE_URL: postgresql+asyncpg://uzumbot_test:testpassword@localhost:5432/uzumbot_test
        run: alembic upgrade head

      - name: Run pytest
        env:
          DATABASE_URL: postgresql+asyncpg://uzumbot_test:testpassword@localhost:5432/uzumbot_test
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/1
          JWT_SECRET: test-jwt-secret
          JWT_REFRESH_SECRET: test-refresh-secret
          ADMIN_JWT_SECRET: test-admin-secret
          BOT_TOKEN: "123456:test"
          BOT_WEBHOOK_SECRET: test-webhook-secret
          BOT_API_HMAC_SECRET: test-hmac-secret
          ENVIRONMENT: test
          MINIO_ENDPOINT: "localhost:9000"
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
        run: pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: packages/backend/coverage.xml
          flags: backend

  # ── Admin frontend (Vitest) ──────────────────────────────────────────────────
  admin-test:
    name: Admin Frontend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: packages/admin

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable corepack / pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Run Vitest
        run: pnpm vitest run --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: packages/admin/coverage/coverage-final.json
          flags: admin

  # ── Bot (pytest) ────────────────────────────────────────────────────────────
  bot-test:
    name: Bot Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: packages/bot

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: packages/bot/requirements*.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        env:
          BOT_TOKEN: "123456:test"
          BOT_WEBHOOK_SECRET: test-webhook-secret
          BOT_API_HMAC_SECRET: test-hmac-secret
          API_BASE_URL: "http://localhost:8000"
        run: pytest tests/ -v || true   # non-fatal if tests dir doesn't exist yet

  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: pip install ruff

      - name: Ruff lint (backend)
        run: ruff check packages/backend/app --output-format=github

      - name: Ruff lint (bot)
        run: ruff check packages/bot/app --output-format=github

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable corepack / pnpm
        run: corepack enable

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: ESLint (admin)
        run: pnpm --filter admin lint
