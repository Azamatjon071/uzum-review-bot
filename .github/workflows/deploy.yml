name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: production
        type: choice
        options: [production, staging]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false   # never cancel an in-flight deploy

jobs:
  # ── Build & push Docker images ───────────────────────────────────────────────
  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service: [backend, bot, admin, webapp]

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./packages/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/${{ matrix.service }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/${{ matrix.service }}:buildcache,mode=max

  # ── Deploy to server via SSH ─────────────────────────────────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: https://${{ secrets.PUBLIC_DOMAIN }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            # Pull latest images
            docker compose pull

            # Run migrations before bringing up new backend
            docker compose run --rm backend alembic upgrade head

            # Rolling restart: backend first, then workers, then bot
            docker compose up -d --no-deps backend
            sleep 10
            docker compose up -d --no-deps celery_worker celery_beat
            sleep 5
            docker compose up -d --no-deps bot admin webapp caddy

            # Prune old images to reclaim disk
            docker image prune -f

      - name: Notify Telegram on success
        if: success()
        uses: appleboy/telegram-action@v0.1.1
        with:
          to: ${{ secrets.ADMIN_CHAT_ID }}
          token: ${{ secrets.BOT_TOKEN }}
          message: |
            ✅ *Deploy succeeded*
            Commit: `${{ github.sha }}`
            Branch: `${{ github.ref_name }}`
            By: ${{ github.actor }}

      - name: Notify Telegram on failure
        if: failure()
        uses: appleboy/telegram-action@v0.1.1
        with:
          to: ${{ secrets.ADMIN_CHAT_ID }}
          token: ${{ secrets.BOT_TOKEN }}
          message: |
            ❌ *Deploy FAILED*
            Commit: `${{ github.sha }}`
            Branch: `${{ github.ref_name }}`
            By: ${{ github.actor }}
            Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
